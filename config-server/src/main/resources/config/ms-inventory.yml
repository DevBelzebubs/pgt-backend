server:
  port: 8083
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_portable?currentSchema=inventory
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true
      format-sql: true
    properties:
      hibernate.default_schema: inventory
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true