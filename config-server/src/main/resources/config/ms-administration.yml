server:
  port: 8082
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_portable?currentSchema=administration
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true
      format-sql: true
    properties:
      hibernate.default_schema: administration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/