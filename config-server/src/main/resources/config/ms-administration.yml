server:
  port: 8082
spring:
  application:
    name: ms-administration
  datasource:
    url: jdbc:postgresql://localhost:5432/db_portable?currentSchema=administration
    username: postgres
    password: admin
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format-sql: true
        default_schema: administration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    ip-address: 127.0.0.1