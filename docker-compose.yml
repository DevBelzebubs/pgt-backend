services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db_portable
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-data:/var/lib/postgresql/data
    networks:
      - pgt-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgt-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgt.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pgt-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pgt-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - pgt-network

networks:
  pgt-network:
    driver: bridge

volumes:
  postgres-db-data: